summary: Listar keys ativas
description: Endpoint para listar todas as keys ativas do usuario

tags:
  - Api Keys

security:
  - BearerAuth: []
responses:
  200:
    description: Lista de keys ativas retornada com sucesso
    schema:
          type: object
          properties:
            status:
              type: string
              description: Status da resposta
            keys:
              type: array
              items:
                type: object
                properties:
                  key: 
                    type: string
                    description: A API Key ativa do usuário
                  created_at:
                    type: integer
                    description: Timestamp de criação da API Key
    example:
          status: "sucesso"
          keys:
            - key: "123e4567-e89b-12d3-a456-426614174000"
              created_at: 1700000000
            - key: "987e6543-e21b-12d3-a456-426614174999"
              created_at: 1700005000

  400:
    description: Requisição inválida - token de autenticação ausente
  401:
    description: Não autorizado - token de acesso inválido ou expirado

  500:
    description: Erro interno do servidor