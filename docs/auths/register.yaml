summary: Registrar usuário
description: Cria um novo usuário no sistema a partir de CPF e senha.

parameters:
  - in: body
    name: body
    description: Dados necessários para criar um usuário
    required: true
    schema:
      type: object
      required:
        - cpf
        - senha
      properties:
        cpf:
          type: string
          description: CPF do usuário
        senha:
          type: string
          description: Senha da conta
      example:
        cpf: "12345678900"
        senha: "senhaSegura123"

responses:
  201:
    description: Usuário criado com sucesso
    content:
      application/json:
        schema:
          type: object
          properties:
            mensagem:
              type: string
        example:
          mensagem: "Usuário criado com sucesso"

  400:
    description: Dados inválidos
    content:
      application/json:
        schema:
          type: object
          properties:
            erro:
              type: string
            codigo:
              type: string
        example:
          erro: "CPF inválido"

  409:
    description: CPF já cadastrado
    content:
      application/json:
        schema:
          type: object
          properties:
            erro:
              type: string
            codigo:
              type: string
        example:
          erro: "CPF já registrado"

  500:
    description: Erro interno do servidor
    content:
      application/json:
        schema:
          type: object
          properties:
            erro:
              type: string
        example:
          erro: "Erro interno no servidor"