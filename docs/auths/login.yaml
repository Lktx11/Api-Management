summary: Login de usuário
description: Autentica um usuário usando CPF e senha, retornando um token de acesso.

tags:
  - Auths

parameters:
  - in: body
    name: body
    description: Dados necessários para autenticar um usuário
    required: true
    schema:
      type: object
      required:
        - cpf
        - senha
      properties:
        cpf:
          type: string
          description: CPF do usuário
        senha:
          type: string
          description: Senha da conta
      example:
        cpf: "12345678900"
        senha: "senhaSegura123"

responses:
  200:
    description: Autenticação bem-sucedida
    schema:
          type: object
          properties:
            token:
              type: string
              description: Token de acesso JWT
    example:
          token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

  400:
    description: Dados de autenticação faltando
  401:
    description: Não autorizado - credenciais inválidas
  404:
    description: Usuário não encontrado